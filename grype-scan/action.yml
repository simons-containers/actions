name: Scan SBOM with Grype
description: Scans the combined SBOM with Grype and uploads the results as an artifact

inputs:
  source:
    description: Path to SBOM
    required: false
    default: sbom.cdx.json
  target:
    description: Image target
    required: false
    default: ""

outputs:
  critical:
    description: Number of critical vulnerabilities
    value: ${{ steps.counts.outputs.critical }}
  high:
    description: Number of high vulnerabilities
    value: ${{ steps.counts.outputs.high }}
  medium:
    description: Number of medium vulnerabilities
    value: ${{ steps.counts.outputs.medium }}
  low:
    description: Number of low vulnerabilities
    value: ${{ steps.counts.outputs.low }}
  negligible:
    description: Number of negligible vulnerabilities
    value: ${{ steps.counts.outputs.negligible }}
  unknown:
    description: Number of unknown vulnerabilities
    value: ${{ steps.counts.outputs.unknown }}

runs:
  using: composite
  steps:

    - name: Set tool versions
      shell: bash
      run: |
        echo "GOMPLATE_VERSION=v5.1.0" >> $GITHUB_ENV
        echo "GRYPE_VERSION=v0.115.0" >> $GITHUB_ENV

    - name: Cache binaries
      id: cache-bins
      uses: actions/cache@v6
      with:
        path: ~/.local/bin
        key: bins-${{ runner.os }}-gomplate-${{ env.GOMPLATE_VERSION }}-grype-${{ env.GRYPE_VERSION }}

    - name: Install gomplate
      if: steps.cache-bins.outputs.cache-hit != 'true'
      shell: bash
      run: |
        mkdir -p ~/.local/bin
        curl -sSL -o ~/.local/bin/gomplate \
          https://github.com/hairyhenderson/gomplate/releases/download/${{ env.GOMPLATE_VERSION }}/gomplate_linux-amd64
        chmod +x ~/.local/bin/gomplate

    - name: Install grype
      if: steps.cache-bins.outputs.cache-hit != 'true'
      shell: bash
      run: |
        curl -sSL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
          | sh -s -- -b ~/.local/bin ${{ env.GRYPE_VERSION }}

    - name: Scan SBOM with Grype 
      shell: bash
      run: |
        grype sbom:${{ inputs.source }} \
          -o json \
          > grype-scan-results.json  

    - name: Count vulnerabilities by severity
      id: counts
      shell: bash
      run: |
        for severity in critical high medium low negligible unknown; do
          count=$(jq --arg s "${severity^}" \
            '[.matches[] | select(.vulnerability.severity == $s)] | length' \
            grype-scan-results.json)
          echo "${severity}=${count}" >> $GITHUB_OUTPUT
        done

    - name: Upload Grype scan results as artifact
      uses: actions/upload-artifact@v7
      with:
        name: grype-scan-results${{ inputs.target && format('-{0}', inputs.target) || '' }}
        path: grype-scan-results.json

    - name: Output Grype scan results to Github Summary with Gomplate
      shell: bash
      run: |
        gomplate \
          -f $GITHUB_ACTION_PATH/summary.tmpl \
          --context .=grype-scan-results.json \
          -o $GITHUB_STEP_SUMMARY
