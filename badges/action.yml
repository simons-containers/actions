name: Update badges
description: Fetches image tags and writes badges.json to the badges branch

inputs:
  version:
    required: true
    description: Current image version
  size:
    required: true
    description: Human readable image size
  registry:
    required: false
    description: Container registry hostname
    default: ghcr.io
  namespace:
    required: false
    description: Container image namespace
    default: simons-containers
  image_name:
    required: true
    description: Image name
  registry_token:
    required: true
    description: Token for the container registry
  badges_token:
    required: false
    description: Token for pushing to badges branch

runs:
  using: composite
  steps:

    - name: Get image tags
      id: tags
      shell: bash
      run: |
        echo "${{ inputs.registry_token }}" | skopeo login ${{ inputs.registry }} \
          --username oauth2 \
          --password-stdin
        TAGS=$(skopeo list-tags \
          docker://${{ inputs.registry }}/${{ inputs.namespace }}/${{ inputs.image_name }} \
          | jq -r '
            .Tags
            | map(select(. != "latest"))
            | map(select(startswith("sha256") | not))
            | sort_by(
                (
                  (. | split("-")) as $p
                  | $p[0] as $core
                  | ($core | split(".") | map(tonumber)) as $nums
                  | ($nums + [0,0,0])[:3] as $v
                  | $p[1] as $suffix
                  | (if $suffix == null then 0 else 1 end) as $rank
                  | [-$v[0], -$v[1], -$v[2], $rank, $suffix]
                )
              )
            | join(" | ")
          ')
        echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

    - name: Create badges branch
      uses: action-badges/create-orphan-branch@0.1.1
      with:
        branch-name: badges

    - name: Generate current version badge
      uses: action-badges/core@0.4.1
      with:
        label: Current Release
        message: ${{ inputs.version }}
        message-color: blue
        file-name: release.svg
        badge-branch: badges
        github-token: "${{ inputs.badges_token }}"

    - name: Generate current size badge
      uses: action-badges/core@0.4.1
      with:
        label: Size
        message: ${{ inputs.size }}
        message-color: blue
        file-name: size.svg
        badge-branch: badges
        github-token: "${{ inputs.badges_token }}"

    - name: Generate tags list
      uses: action-badges/core@0.4.1
      with:
        label: Available Tags
        message: ${{ steps.tags.outputs.tags }}
        message-color: blue
        file-name: tags.svg
        badge-branch: badges
        github-token: "${{ inputs.badges_token }}"
