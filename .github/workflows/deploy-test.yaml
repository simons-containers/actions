name: Test deploy action

on:
  workflow_dispatch:
  push:
    paths:
      - badges/**
      - build/**
      - combine-sboms/**
      - create-sbom/*
      - deploy/**
      - generate-build-args/**
      - grype-scan/**
      - push/**
      - require-file/**

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create sources.json fixture
        run: |
          cat > sources.json <<'EOF'
          {
            "tzdb": {
              "version": "2026b",
              "purl": "pkg:generic/tzdb",
              "source": {
                "url_pattern": "https://data.iana.org/time-zones/releases/tzdb-{version}.tar.lz"
              }
            },
            "glibc": {
              "version": "2.42",
              "purl": "pkg:generic/glibc",
              "source": {
                "url": "https://sourceware.org/git/glibc.git",
                "tag_pattern": "glibc-{version}"
              }
            },
            "caddy": {
              "version": "2.10.2",
              "purl": "pkg:generic/caddy",
              "release": {
                "url_pattern": "https://github.com/caddyserver/caddy/releases/download/v{version}/caddy_{version}_linux_amd64.tar.gz"
              }
            }
          }
          EOF

      - name: Create caddy fixture
        run: |
          wget https://github.com/caddyserver/caddy/releases/download/v2.10.2/caddy_2.10.2_linux_amd64.tar.gz
          tar xf caddy_2.10.2_linux_amd64.tar.gz

      - name: Create Containerfile fixture
        run: |
          cat > Containerfile <<'EOF'
          FROM scratch

          ARG TZDB_VERSION
          ARG TZDB_SOURCE

          ARG GLIBC_VERSION
          ARG GLIBC_SOURCE
          ARG GLIBC_TAG

          ARG CADDY_VERSION
          ARG CADDY_RELEASE

          COPY ./caddy /usr/bin/caddy

          EOF

      - name: Deploy image
        uses: ./deploy
        with:
          appname: caddy
          image_name: actions
          namespace: simons-containers
          registry: ghcr.io
          registry_token: ${{ secrets.GITHUB_TOKEN }}
          badges_token: ${{ secrets.GITHUB_TOKEN }}
          tag_latest: ${{ github.ref_name == github.event.repository.default_branch }}
          suffix: deploy-test