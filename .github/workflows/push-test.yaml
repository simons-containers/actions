name: Test push action

on:
  workflow_dispatch:
  push:
    paths:
      - push/**

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create sources.json fixture
        run: |
          cat > sources.json <<'EOF'
          {
            "tzdb": {
              "version": "2026b",
              "purl": "pkg:generic/tzdb",
              "source": {
                "url_pattern": "https://data.iana.org/time-zones/releases/tzdb-{version}.tar.lz"
              }
            },
            "glibc": {
              "version": "2.42",
              "purl": "pkg:generic/glibc",
              "source": {
                "url": "https://sourceware.org/git/glibc.git",
                "tag_pattern": "glibc-{version}"
              }
            },
            "caddy": {
              "version": "2.10.2",
              "purl": "pkg:generic/caddy",
              "release": {
                "url_pattern": "https://github.com/caddyserver/caddy/releases/download/v{version}/caddy_{version}_linux_amd64.tar.gz"
              }
            }
          }
          EOF

      - name: Create Containerfile fixture
        run: |
          cat > Containerfile <<'EOF'
          FROM scratch

          ARG TZDB_VERSION
          ARG TZDB_SOURCE

          ARG GLIBC_VERSION
          ARG GLIBC_SOURCE
          ARG GLIBC_TAG

          ARG CADDY_VERSION
          ARG CADDY_RELEASE
          EOF

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Run build action
        id: build
        uses: ./build
        with:
          containerfile: Containerfile
          context: .
          target: ""

      - name: Run push action
        id: push
        uses: ./push
        with:
          appname: caddy
          image_name: actions
          namespace: simons-containers
          registry: ghcr.io
          registry_token: ${{ secrets.GITHUB_TOKEN }}